schema_version: 1

context:
  name: langchain-chroma
  version: "1.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/langchain_chroma-${{ version }}.tar.gz
  sha256: 8069685e7848041e998d16c8a4964256b031fd20551bf59429173415bc2adc12

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<3.13
    - langchain-core >=1.1.3,<2.0.0
    - chromadb >=1.3.5,<2.0.0
    - numpy >=1.26.0
    - fastapi <1,>=0.95.2
  run_constraints:
    - fastapi >=0.95.2,<1

tests:
  - python:
      imports:
        - langchain_chroma
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: An integration package connecting Chroma and LangChain
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/langchain-ai/langchain

extra:
  recipe-maintainers:
    - jan-janssen
